name: Build ShiftSaver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}

    defaults:
      run:
        working-directory: ShiftSaver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Regenerate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.9
          chmod +x gradlew

      # Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Build
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Build Release APK unsigned
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache --stacktrace

      # Verify
      - name: List produced APKs and sizes
        run: |
          echo "=== Debug APKs ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec sh -c 'echo "$(du -h "$1" | cut -f1)  $1"' _ {} \;
          echo "=== Release APKs ==="
          find app/build/outputs/apk/release -name "*.apk" -exec sh -c 'echo "$(du -h "$1" | cut -f1)  $1"' _ {} \;

      # GitHub Artifacts
      - name: Upload Debug APKs to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ShiftSaver-debug
          path: ShiftSaver/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APKs to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ShiftSaver-release-unsigned
          path: ShiftSaver/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Telegram
      - name: Send debug APK to Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)

          if [ -z "$DEBUG_APK" ]; then
            echo "Debug APK not found"
            exit 1
          fi

          ZIP_PATH="/tmp/ShiftSaver-debug.zip"
          zip -j "$ZIP_PATH" "$DEBUG_APK"

          APK_SIZE=$(du -h "$DEBUG_APK" | cut -f1)
          ZIP_SIZE=$(du -h "$ZIP_PATH" | cut -f1)

          CAPTION="*ShiftSaver* - Debug APK
          Branch: \`${{ github.ref_name }}\`
          Commit: \`${SHORT_SHA}\` - ${COMMIT_MSG}
          APK size: ${APK_SIZE} -> zipped: ${ZIP_SIZE}
          Run: [#${{ github.run_number }}](${RUN_URL})"

          CURL_ARGS=(
            -s
            -X POST
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
            -F "chat_id=${TELEGRAM_CHAT_ID}"
            -F "document=@${ZIP_PATH}"
            -F "caption=${CAPTION}"
            -F "parse_mode=Markdown"
          )

          if [ -n "${TELEGRAM_TOPIC_ID}" ]; then
            CURL_ARGS+=(-F "message_thread_id=${TELEGRAM_TOPIC_ID}")
          fi

          RESPONSE=$(curl "${CURL_ARGS[@]}")

          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Sent debug APK to Telegram, zipped size: ${ZIP_SIZE}"
          else
            echo "Telegram upload failed: $RESPONSE"
            exit 1
          fi
